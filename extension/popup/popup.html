<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=380">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <span class="logo">Aether</span>
      <button id="settings-btn" class="btn-icon" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Auth Required -->
    <div id="auth-view" class="view hidden">
      <div class="empty-state">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
        </div>
        <p class="empty-title">Sign in to Aether</p>
        <p class="empty-desc">Open the webapp to connect your account</p>
        <button id="sign-in-btn" class="btn-primary">Open Aether</button>
      </div>
    </div>

    <!-- Main Content -->
    <div id="main-view" class="view hidden">
      <!-- Current Page Section -->
      <section class="section current-page-section">
        <div class="current-page">
          <div id="page-favicon" class="page-favicon"></div>
          <span id="page-url" class="page-url"></span>
        </div>
        <button id="save-btn" class="btn-primary save-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Save to Aether
        </button>
        <div id="save-status" class="save-status hidden"></div>
      </section>

      <hr class="divider">

      <!-- Search Section -->
      <section class="section">
        <div class="search-bar">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search-input" placeholder="Search your vault..." autocomplete="off">
          <button id="search-clear" class="search-clear hidden">&times;</button>
        </div>
        <div id="search-results" class="results-list hidden"></div>
      </section>

      <!-- Processing Section -->
      <section id="processing-section" class="section hidden">
        <h3 class="section-title">Processing</h3>
        <div id="processing-list" class="results-list"></div>
      </section>

      <hr class="divider" id="recent-divider">

      <!-- Recent Notes Section -->
      <section class="section">
        <h3 class="section-title">Recent</h3>
        <div id="recent-notes" class="results-list"></div>
        <div id="recent-empty" class="empty-mini hidden">
          <p>No notes yet</p>
        </div>
        <div id="recent-loading" class="loading hidden">
          <div class="spinner"></div>
        </div>
      </section>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
